<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PRISM-15 Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:#080c14; color:#e2e8f0; min-height:100vh; -webkit-tap-highlight-color:transparent; }
.header { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; background:#0a0e17; border-bottom:1px solid rgba(255,255,255,0.06); position:sticky; top:0; z-index:100; }
.logo { font-size:18px; font-weight:800; letter-spacing:-0.5px; }
.logo-prism { color:#e2e8f0; }
.logo-15 { color:#06b6d4; }
.header-right { display:flex; align-items:center; gap:8px; }
.live-badge { display:flex; align-items:center; gap:5px; font-size:10px; font-weight:700; padding:4px 10px; border-radius:16px; }
.live-badge.on { color:#22c55e; background:rgba(34,197,94,0.1); }
.live-badge.off { color:#64748b; background:rgba(100,116,139,0.1); }
.live-badge .dot { width:6px; height:6px; border-radius:50%; }
.live-badge.on .dot { background:#22c55e; animation:pulse 1.5s infinite; }
.live-badge.off .dot { background:#64748b; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.refresh-btn { width:32px; height:32px; border-radius:50%; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); color:#94a3b8; font-size:16px; cursor:pointer; }
.kite-bar { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; background:rgba(255,255,255,0.02); border-bottom:1px solid rgba(255,255,255,0.04); }
.kite-status { display:flex; align-items:center; gap:8px; font-size:13px; }
.kite-dot { width:8px; height:8px; border-radius:50%; background:#ef4444; }
.kite-dot.on { background:#22c55e; }
.kite-btn { padding:8px 16px; border-radius:8px; font-size:12px; font-weight:700; border:none; cursor:pointer; }
.kite-btn.login { background:#22c55e; color:#000; }
.kite-btn.logout { background:rgba(239,68,68,0.15); color:#ef4444; }
.connect-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; min-height:60vh; }
.connect-title { font-size:20px; font-weight:700; margin-bottom:8px; }
.connect-desc { font-size:13px; color:#64748b; margin-bottom:24px; }
.connect-input { width:100%; max-width:300px; padding:12px 16px; border-radius:10px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); color:#e2e8f0; font-size:14px; margin-bottom:12px; font-family:'JetBrains Mono',monospace; }
.connect-btn { width:100%; max-width:300px; padding:12px; border-radius:10px; background:linear-gradient(135deg,#06b6d4,#3b82f6); color:#fff; font-size:14px; font-weight:700; border:none; cursor:pointer; }
.main { display:none; padding-bottom:20px; }
.main.show { display:block; }
.trade-card { margin:12px; border-radius:12px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); overflow:hidden; }
.trade-card-header { padding:10px 14px; font-size:11px; font-weight:600; color:#06b6d4; letter-spacing:0.04em; text-align:center; border-bottom:1px solid rgba(255,255,255,0.04); }
.trade-waiting { padding:24px 16px; text-align:center; }
.trade-waiting-text { font-size:13px; color:#475569; font-style:italic; }
.signal-card { display:none; }
.signal-card.show { display:block; }
.signal-top { display:flex; justify-content:space-between; align-items:center; padding:12px 14px; }
.signal-pattern { font-size:18px; font-weight:800; color:#e2e8f0; }
.signal-dir { font-size:11px; font-weight:700; padding:4px 12px; border-radius:6px; }
.signal-dir.long { background:rgba(34,197,94,0.15); color:#22c55e; }
.signal-dir.short { background:rgba(239,68,68,0.15); color:#ef4444; }
.signal-status { text-align:center; padding:4px 14px 12px; font-size:11px; font-weight:600; }
.signal-status.pending { color:#f59e0b; }
.signal-status.limit-pending { color:#fbbf24; }
.signal-status.executed { color:#22c55e; }
.signal-levels { display:flex; border-top:1px solid rgba(255,255,255,0.04); }
.signal-level { flex:1; text-align:center; padding:10px 8px; border-right:1px solid rgba(255,255,255,0.04); }
.signal-level:last-child { border-right:none; }
.signal-level-label { font-size:9px; color:#64748b; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; }
.signal-level-value { font-size:13px; font-weight:700; font-family:'JetBrains Mono',monospace; margin-top:2px; }
.signal-level-value.entry { color:#06b6d4; }
.signal-level-value.target { color:#22c55e; }
.signal-level-value.sl { color:#ef4444; }
.position-card { display:none; }
.position-card.show { display:block; }
.position-pnl { text-align:center; padding:8px 14px 4px; }
.position-pnl-value { font-size:28px; font-weight:800; font-family:'JetBrains Mono',monospace; }
.position-pnl-value.profit { color:#22c55e; }
.position-pnl-value.loss { color:#ef4444; }
.position-pnl-sub { font-size:11px; color:#64748b; margin-top:2px; padding-bottom:8px; text-align:center; }
.position-progress { height:4px; background:rgba(255,255,255,0.06); margin:0 14px; border-radius:2px; overflow:hidden; }
.position-progress-bar { height:100%; border-radius:2px; transition:width 0.5s; }
.position-progress-bar.to-target { background:#22c55e; }
.position-progress-bar.to-sl { background:#ef4444; }
.position-labels { display:flex; justify-content:space-between; padding:4px 14px 8px; font-size:9px; color:#475569; }
.trade-result { display:none; text-align:center; padding:16px 14px; }
.trade-result.show { display:block; }
.trade-result-type { font-size:12px; font-weight:700; margin-bottom:4px; }
.trade-result-type.target { color:#22c55e; }
.trade-result-type.sl { color:#ef4444; }
.trade-result-type.hard_exit { color:#f59e0b; }
.trade-result-pnl { font-size:22px; font-weight:800; font-family:'JetBrains Mono',monospace; }
.patterns-section { margin:12px; border-radius:12px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); overflow:hidden; }
.patterns-title { padding:10px 14px; font-size:11px; font-weight:700; color:#94a3b8; letter-spacing:0.06em; text-transform:uppercase; border-bottom:1px solid rgba(255,255,255,0.04); }
.pattern-row { display:flex; justify-content:space-between; align-items:center; padding:8px 14px; border-bottom:1px solid rgba(255,255,255,0.02); }
.pattern-row:last-child { border-bottom:none; }
.pattern-name { font-size:12px; font-weight:700; }
.pattern-desc { font-size:10px; color:#475569; margin-left:8px; }
.pb { font-size:9px; font-weight:700; padding:3px 8px; border-radius:4px; letter-spacing:0.04em; }
.pb-fired { background:rgba(34,197,94,0.12); color:#22c55e; }
.pb-mon { background:rgba(255,255,255,0.06); color:#94a3b8; }
.pb-block { background:rgba(239,68,68,0.12); color:#ef4444; }
.pb-exp { background:rgba(245,158,11,0.12); color:#f59e0b; }
.pb-pend { background:rgba(255,255,255,0.06); color:#94a3b8; }
.pb-lp { background:rgba(251,191,36,0.12); color:#fbbf24; }
.pb-ne { background:rgba(249,115,22,0.12); color:#f97316; }
.pb-nm { background:rgba(255,255,255,0.04); color:#334155; }
.ps { color:#f472b6; }
.pd { color:#ec4899; }
.pb2 { color:#38bdf8; }
.footer { text-align:center; padding:12px; font-size:10px; color:#334155; }
</style>
</head>
<body>
<div class="header">
  <div class="logo"><span class="logo-prism">PRISM–</span><span class="logo-15">15</span></div>
  <div class="header-right">
    <div class="live-badge off" id="liveBadge"><span class="dot"></span><span id="liveText">OFFLINE</span></div>
    <button class="refresh-btn" onclick="manualRefresh()">⟳</button>
  </div>
</div>
<div class="connect-screen" id="connectScreen">
  <div class="connect-title">Connect to PRISM-15</div>
  <div class="connect-desc">Enter your Supabase Anon Key</div>
  <input type="password" class="connect-input" id="keyInput" placeholder="Supabase Anon Key">
  <button class="connect-btn" onclick="connect()">Connect</button>
</div>
<div class="main" id="mainContent">
  <div class="kite-bar">
    <div class="kite-status"><span class="kite-dot" id="kiteDot"></span><span id="kiteStatus">Kite: Not connected</span></div>
    <button class="kite-btn login" id="kiteBtn" onclick="handleKite()">Login to Kite</button>
  </div>
  <div class="trade-card">
    <div class="trade-card-header" id="tradeHeader">NIFTY26APRFUT | MIS | 1 lot (65 qty)</div>
    <div class="trade-waiting" id="tradeWaiting"><div class="trade-waiting-text">Waiting for pattern triggering...</div></div>
    <div class="signal-card" id="signalCard">
      <div class="signal-top"><div class="signal-pattern" id="sigPattern">—</div><div class="signal-dir" id="sigDir">—</div></div>
      <div class="signal-status" id="sigStatus"></div>
      <div class="signal-levels">
        <div class="signal-level"><div class="signal-level-label">Entry</div><div class="signal-level-value entry" id="sigEntry">—</div></div>
        <div class="signal-level"><div class="signal-level-label">Target</div><div class="signal-level-value target" id="sigTarget">—</div></div>
        <div class="signal-level"><div class="signal-level-label">SL</div><div class="signal-level-value sl" id="sigSL">—</div></div>
      </div>
    </div>
    <div class="position-card" id="positionCard">
      <div class="signal-top"><div class="signal-pattern" id="posPattern">—</div><div class="signal-dir" id="posDir">—</div></div>
      <div class="position-pnl"><div class="position-pnl-value" id="posPnL">+₹0</div><div class="position-pnl-sub" id="posPnLSub">0 pts × 65 qty</div></div>
      <div class="position-progress"><div class="position-progress-bar" id="posProgress"></div></div>
      <div class="position-labels"><span id="posSLLabel">SL</span><span id="posEntryLabel">Entry</span><span id="posTargetLabel">Target</span></div>
      <div class="signal-levels">
        <div class="signal-level"><div class="signal-level-label">Entry</div><div class="signal-level-value entry" id="posEntry">—</div></div>
        <div class="signal-level"><div class="signal-level-label">Target</div><div class="signal-level-value target" id="posTarget">—</div></div>
        <div class="signal-level"><div class="signal-level-label">SL</div><div class="signal-level-value sl" id="posSL">—</div></div>
      </div>
    </div>
    <div class="trade-result" id="tradeResult">
      <div class="trade-result-type" id="resultType">TARGET HIT</div>
      <div class="trade-result-pnl" id="resultPnL">+₹3,250</div>
    </div>
  </div>
  <div class="patterns-section">
    <div class="patterns-title" id="patternsTitle">PATTERNS</div>
    <div id="patternList"></div>
  </div>
  <div class="footer">Last updated: <span id="lastUpdated">—</span></div>
</div>
<script>
var SUPABASE_URL="https://drandawdwqcsmbxoaras.supabase.co";
var KITE_API_KEY="toric63avf1rqsz2";
var KITE_LOGIN_URL="https://kite.zerodha.com/connect/login?v=3&api_key="+KITE_API_KEY;
var KEY=null,refreshInterval=null,currentNiftyPrice=null,accessToken=null,kiteUserId=null;
var PM={SB1:{d:"C1 High Breakout (Outside)"},SB2:{d:"C1 High Breakout (Inside)"},SA1:{d:"Low Break Reversal"},SC1:{d:"Multi-Pivot Breakdown"},SD1:{d:"Above PDH"},SD2:{d:"Below PDH, Above CPR"},SD3:{d:"Inside CPR"},SD4:{d:"Below CPR, Above PDL"},SD5:{d:"Below PDL"},BA1:{d:"Pivot Touch Rejection"},BB1:{d:"PE Reference High"},BC1:{d:"CPR Inside Pullback"},BC2:{d:"Above CPR Top Limit"}};
function connect(){var k=document.getElementById("keyInput").value.trim();if(!k){alert("Enter key");return}KEY=k;localStorage.setItem("prism_key",k);document.getElementById("connectScreen").style.display="none";document.getElementById("mainContent").classList.add("show");checkKiteToken();fetchData();refreshInterval=setInterval(fetchData,3000);setLive("live")}
document.addEventListener("DOMContentLoaded",function(){var s=localStorage.getItem("prism_key");if(s)document.getElementById("keyInput").value=s;var p=new URLSearchParams(window.location.search);if(p.has("kite_success")){window.history.replaceState({},"",window.location.pathname);if(s)setTimeout(connect,100)}if(p.has("kite_error")){window.history.replaceState({},"",window.location.pathname);alert("Kite login failed: "+p.get("kite_error"))}});
function manualRefresh(){if(KEY)fetchData()}
async function Q(t,q){var r=await fetch(SUPABASE_URL+"/rest/v1/"+t+"?"+q,{headers:{"apikey":KEY,"Authorization":"Bearer "+KEY}});return r.json()}
async function checkKiteToken(){if(!KEY)return;var d=new Date(),ist=new Date(d.getTime()+(5.5*60*60*1000)),ds=ist.toISOString().split("T")[0];try{var t=await Q("kite_auth","select=*&token_date=eq."+ds);if(t.length>0){accessToken=t[0].access_token;kiteUserId=t[0].user_id;updateKiteUI(true)}else{updateKiteUI(false)}}catch(e){updateKiteUI(false)}}
function handleKite(){if(accessToken){accessToken=null;kiteUserId=null;updateKiteUI(false)}else{localStorage.setItem("kite_login_from","mobile");window.location.href=KITE_LOGIN_URL}}
function updateKiteUI(on){var d=document.getElementById("kiteDot"),s=document.getElementById("kiteStatus"),b=document.getElementById("kiteBtn");if(on){d.classList.add("on");s.textContent="Kite: "+kiteUserId;b.textContent="Logout";b.className="kite-btn logout"}else{d.classList.remove("on");s.textContent="Kite: Not connected";b.textContent="Login to Kite";b.className="kite-btn login"}}
function setLive(status){var b=document.getElementById("liveBadge"),t=document.getElementById("liveText");if(status==="live"){b.className="live-badge on";t.textContent="LIVE"}else if(status==="completed"){b.className="live-badge off";t.textContent="COMPLETED"}else{b.className="live-badge off";t.textContent="OFFLINE"}}
function F(v){return v!=null?Number(v).toFixed(2):"—"}
async function fetchData(){if(!KEY)return;try{var d=new Date(),ist=new Date(d.getTime()+(5.5*60*60*1000)),ds=ist.toISOString().split("T")[0];var sessions=await Q("sessions","select=*&trade_date=eq."+ds+"&limit=1");if(!sessions||!sessions.length){showWaiting("No session — waiting for 9:15 AM");setLive("off");renderPatterns(null);return}var session=sessions[0],sid=session.id;setLive(session.status==="scanning"||session.status==="active"?"live":session.status==="completed"?"completed":"off");var r=await Promise.all([Q("session_state","select=*&session_id=eq."+sid+"&limit=1"),Q("candles","select=close&session_id=eq."+sid+"&order=candle_number.desc&limit=1"),Q("signals","select=*&session_id=eq."+sid+"&order=created_at.desc&limit=1"),Q("positions","select=*&session_id=eq."+sid+"&order=created_at.desc&limit=1"),Q("settings","select=lot_size&limit=1")]);var state=r[0][0]||null,lc=r[1][0]||null,signal=r[2][0]||null,pos=r[3][0]||null,settings=r[4][0]||null;if(lc)currentNiftyPrice=lc.close;var sym=(state&&state.trading_symbol)?state.trading_symbol:"NIFTY26APRFUT";var lots=(settings&&settings.lot_size)?settings.lot_size:1;document.getElementById("tradeHeader").textContent=sym+" | MIS | "+lots+" lot ("+(lots*65)+" qty)";if(pos&&pos.status==="open"){showPosition(pos,state)}else if(pos&&pos.status==="closed"){showResult(pos)}else if(signal&&(signal.status==="pending"||signal.status==="executing")&&state&&!state.trade_taken&&state.pending_limit_entry_level){showLimitPending(signal,state)}else if(signal&&signal.status==="executing"&&state&&!state.trade_taken&&!state.pending_limit_entry_level){showWaiting(session.status==="completed"?"Session completed — limit expired, no trade":"Limit expired — no entry")}else if(signal&&signal.status==="pending"){showSignal(signal)}else if(state&&state.pending_limit_entry_level){showLimitPending(signal,state)}else if(state){var cn=state.candles_processed||0;showWaiting(session.status==="completed"?"Session completed — no trade":"Scanning... C"+cn+"/180")}else{showWaiting("Waiting for first candle (9:15 AM)")}renderPatterns(state);document.getElementById("lastUpdated").textContent=new Date().toLocaleTimeString("en-IN",{hour12:false})}catch(e){console.error(e)}}
function hideAll(){document.getElementById("tradeWaiting").style.display="none";document.getElementById("signalCard").className="signal-card";document.getElementById("positionCard").className="position-card";document.getElementById("tradeResult").className="trade-result"}
function showWaiting(t){hideAll();document.getElementById("tradeWaiting").style.display="block";document.getElementById("tradeWaiting").querySelector(".trade-waiting-text").textContent=t}
function showSignal(sig){hideAll();document.getElementById("signalCard").className="signal-card show";document.getElementById("sigPattern").textContent=sig.pattern;var d=sig.direction||"—",de=document.getElementById("sigDir");de.textContent=d;de.className="signal-dir "+d.toLowerCase();var se=document.getElementById("sigStatus");se.textContent=sig.status==="pending"?"⏳ Pending approval":"⚡ Auto-executing...";se.className="signal-status "+(sig.status==="pending"?"pending":"executed");document.getElementById("sigEntry").textContent=F(sig.entry_level);document.getElementById("sigTarget").textContent=F(sig.target_level);document.getElementById("sigSL").textContent=F(sig.sl_level)}
function showLimitPending(sig,st){hideAll();document.getElementById("signalCard").className="signal-card show";document.getElementById("sigPattern").textContent=st.pending_limit_pattern||(sig?sig.pattern:"—");var d=st.pending_limit_direction||(sig?sig.direction:"—"),de=document.getElementById("sigDir");de.textContent=d;de.className="signal-dir "+(d||"").toLowerCase();var se=document.getElementById("sigStatus");se.textContent="📍 LIMIT PENDING — spot must reach "+F(st.pending_limit_entry_level);se.className="signal-status limit-pending";document.getElementById("sigEntry").textContent=F(st.pending_limit_entry_level);document.getElementById("sigTarget").textContent=sig?F(sig.target_level):"—";document.getElementById("sigSL").textContent=sig?F(sig.sl_level):"—"}
function showPosition(pos,st){hideAll();document.getElementById("positionCard").className="position-card show";document.getElementById("posPattern").textContent=pos.pattern||(st?st.active_pattern:"")||"OPEN";var d=pos.direction,de=document.getElementById("posDir");de.textContent=d;de.className="signal-dir "+d.toLowerCase();var entry=pos.entry_price_actual||pos.entry_price_nifty,cur=currentNiftyPrice||entry,pts=d==="LONG"?cur-entry:entry-cur,qty=pos.entry_quantity||65,rs=pts*qty;var pe=document.getElementById("posPnL");pe.textContent=(rs>=0?"+":"")+"₹"+Math.abs(rs).toLocaleString("en-IN",{maximumFractionDigits:0});pe.className="position-pnl-value "+(rs>=0?"profit":"loss");document.getElementById("posPnLSub").textContent=(pts>=0?"+":"")+pts.toFixed(1)+" pts × "+qty+" qty";var tgt=pos.target_level,sl=pos.sl_level,rng=tgt-sl,prog=Math.max(0,Math.min(100,((cur-sl)/rng)*100));var bar=document.getElementById("posProgress");bar.style.width=prog+"%";bar.className="position-progress-bar "+(pts>=0?"to-target":"to-sl");document.getElementById("posSLLabel").textContent="SL: "+F(sl);document.getElementById("posEntryLabel").textContent="Entry: "+F(entry);document.getElementById("posTargetLabel").textContent="Target: "+F(tgt);document.getElementById("posEntry").textContent=F(entry);document.getElementById("posTarget").textContent=F(tgt);document.getElementById("posSL").textContent=F(sl)}
function showResult(pos){hideAll();document.getElementById("tradeResult").className="trade-result show";var t=pos.exit_type||"closed",te=document.getElementById("resultType"),lb={target:"TARGET HIT ✓",sl:"STOP LOSS ✗",hard_exit:"HARD EXIT ⏰",manual:"MANUAL EXIT"};te.textContent=lb[t]||t.toUpperCase();te.className="trade-result-type "+t;var pnl=Number(pos.pnl_points||0),qty=pos.entry_quantity||65,rs=pnl*qty;var pe=document.getElementById("resultPnL");pe.textContent=(rs>=0?"+":"")+"₹"+Math.abs(rs).toLocaleString("en-IN",{maximumFractionDigits:0})+" ("+(pnl>=0?"+":"")+pnl.toFixed(1)+" pts)";pe.style.color=rs>=0?"#22c55e":"#ef4444"}
function renderPatterns(st){var el=document.getElementById("patternList");if(!st||!st.c1_type){el.innerHTML='<div style="padding:16px;text-align:center;color:#334155;font-size:12px">No session data</div>';document.getElementById("patternsTitle").textContent="PATTERNS";return}var cn=st.candles_processed||0;document.getElementById("patternsTitle").textContent=st.c1_type==="seller"?"SELLER PATTERNS":"BUYER PATTERNS";var rows=[];if(st.c1_type==="seller"){var dl={SB1:4,SB2:60,SA1:8,SC1:20};["SB1","SB2","SA1","SC1"].forEach(function(p){var conf=st[p.toLowerCase()+"_confirmed"],fired=st.seller_pattern_fired,s,b;if(conf){s="FIRED";b="fired"}else if(fired&&fired!=="SA1_NO_TRADE"){s="BLOCKED";b="block"}else if(cn>(dl[p]||60)){s="EXPIRED";b="exp"}else{s="MONITORING";b="mon"}rows.push({p:p,s:s,b:b,o:conf?0:s==="MONITORING"?1:2,c:"ps"})});["SD1","SD2","SD3","SD4","SD5"].forEach(function(p){var s,b;if(st.sd_pattern===p){if(st.trade_taken){s="FIRED";b="fired"}else if(st.pending_limit_entry_level!=null){s="LIMIT PENDING";b="lp"}else{s="NO ENTRY";b="ne"}}else if(st.sd_pattern_evaluated||cn>=20){s="—";b="nm"}else{s="PENDING (C20)";b="pend"}if(st.seller_pattern_fired&&st.seller_pattern_fired!=="SA1_NO_TRADE"&&st.sd_pattern!==p){s="BLOCKED";b="block"}rows.push({p:p,s:s,b:b,o:s==="FIRED"||s==="LIMIT PENDING"||s==="NO ENTRY"?0:s==="MONITORING"||s==="PENDING (C20)"?1:2,c:"pd"})})}else{var dl={BA1:20,BB1:40,BC1:20,BC2:60};["BA1","BB1","BC1","BC2"].forEach(function(p){var conf=st[p.toLowerCase()+"_confirmed"],fired=st.buyer_pattern_fired,s,b;if(conf){s="FIRED";b="fired"}else if(fired){s="BLOCKED";b="block"}else if(cn>(dl[p]||60)){s="EXPIRED";b="exp"}else{s="MONITORING";b="mon"}rows.push({p:p,s:s,b:b,o:conf?0:s==="MONITORING"?1:2,c:"pb2"})})}rows.sort(function(a,b){return a.o-b.o});var h="";rows.forEach(function(r){h+='<div class="pattern-row"><div><span class="pattern-name '+r.c+'">'+r.p+'</span><span class="pattern-desc">'+(PM[r.p]?PM[r.p].d:"")+'</span></div><span class="pb pb-'+r.b+'">'+r.s+'</span></div>'});el.innerHTML=h}
</script>
</body>
</html>
